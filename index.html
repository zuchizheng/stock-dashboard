const STATUS = {
  "自选":   {cls:"b-sel", icon:"⭐"},
  "已入场": {cls:"b-ent", icon:"🚀"},
  "观察中": {cls:"b-obs", icon:"👀"},
};

let filter = "all";

function spark(history){
  const closes = (history||[]).map(h=>h.close).filter(v=>typeof v==="number");
  if(closes.length < 2) return '<div class="spark"></div>';
  const w=300, h=48, pad=4;
  const min=Math.min(...closes), max=Math.max(...closes);
  const rng = max-min || 1;
  const pts = closes.map((c,i)=>{
    const x = pad + i*(w-2*pad)/(closes.length-1);
    const y = pad + (h-2*pad)*(1-(c-min)/rng);
    return [x,y];
  });
  const path = pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const rising = closes[closes.length-1] >= closes[0];
  const col = rising ? "var(--green)" : "var(--red)";
  const area = path + ` L ${pts[pts.length-1][0].toFixed(1)} ${h-pad} L ${pts[0][0].toFixed(1)} ${h-pad} Z`;
  const id = "g"+Math.random().toString(36).slice(2,8);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".28"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="1.8"/>
  </svg>`;
}

function metric(label, val){ return `<div class="m"><span>${label}</span><b>${val}</b></div>`; }

function card(s){
  const st = STATUS[s.status] || {cls:"", icon:""};
  const hist = s.history || [];
  const last = hist.length ? hist[hist.length-1] : null;
  const ck = s.checks || {};
  const buf = (ck.life_buffer ?? null);
  const bufCol = buf==null ? "" : (buf>5?"up":(buf>2?"":"down"));

  let priceHtml = "";
  if(last){
    const pc = last.pct;
    const pcCls = pc>0?"up":(pc<0?"down":"");
    const sign = pc>0?"+":"";
    priceHtml = `<div class="price">
      <span class="now">${last.close}</span>
      <span class="pct ${pcCls}">${sign}${pc}%</span></div>`;
  }

  const checks = [];
  if(Object.keys(ck).length){
    checks.push(`<span class="tag ${ck.price_hold?"ok":"no"}">守线 ${ck.price_hold?"✓":"✕"}</span>`);
    checks.push(`<span class="tag">新高 ${ck.new_high_days??0}天</span>`);
    checks.push(`<span class="tag ${ck.vol_ok?"ok":"no"}">量比 ${ck.vol_ratio??"?"} ${ck.vol_ok?"✓":"✕"}</span>`);
  }

  const entry = s.entry_date
    ? `<div class="entry">🚀 入场信号日：${s.entry_date}</div>` : "";

  return `<div class="card" data-status="${s.status}">
    <div class="top">
      <div>
        <div class="name">${s.name}<span class="code">${s.code}</span></div>
        <div class="ind">${s.industry||""}</div>
      </div>
      <span class="badge ${st.cls}">${st.icon} ${s.status}</span>
    </div>
    ${spark(hist)}
    ${priceHtml}
    <div class="metrics">
      ${metric("涨停日", s.zt_date||"—")}
      ${metric("涨停价", s.zt_close??"—")}
      ${metric("跟踪", (s.days_tracked??0)+" 天")}
      ${metric("守线余量", buf==null?"—":`<span class="${bufCol}">${buf>0?"+":""}${buf}%</span>`)}
      ${metric("入池位置", s.low_pos!=null?Math.round(s.low_pos*100)+"%":"—")}
      ${metric("前期涨幅", s.run_up!=null?s.run_up+"%":"—")}
    </div>
    <div class="checks">${checks.join("")}</div>
    ${entry}
  </div>`;
}

function render(){
  // chips 概览
  const cnt = {自选:0,已入场:0,观察中:0};
  DATA.forEach(s=>{ if(cnt[s.status]!=null) cnt[s.status]++; });
  document.getElementById("chips").innerHTML =
    `<div class="chip"><b>${DATA.length}</b>总跟踪</div>`+
    `<div class="chip"><b>${cnt.自选}</b>⭐自选</div>`+
    `<div class="chip"><b>${cnt.已入场}</b>🚀已入场</div>`+
    `<div class="chip"><b>${cnt.观察中}</b>👀观察中</div>`;

  let list = DATA.filter(s=> filter==="all" || s.status===filter);

  const sortBy = document.getElementById("sort").value;
  const num = v => (typeof v==="number"?v:-Infinity);
  list.sort((a,b)=>{
    if(sortBy==="days")   return num(b.days_tracked)-num(a.days_tracked);
    if(sortBy==="buffer") return num(b.checks?.life_buffer)-num(a.checks?.life_buffer);
    if(sortBy==="highs")  return num(b.checks?.new_high_days)-num(a.checks?.new_high_days);
    if(sortBy==="pos")    return num(a.low_pos)-num(b.low_pos);
    if(sortBy==="code")   return String(a.code).localeCompare(String(b.code));
    return 0;
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = list.length ? list.map(card).join("")
    : '<div class="empty">该状态下暂无股票</div>';
}

document.querySelectorAll(".btn[data-f]").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll(".btn[data-f]").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    filter = b.dataset.f;
    render();
  };
});
document.getElementById("sort").onchange = render;
render();
</script>
